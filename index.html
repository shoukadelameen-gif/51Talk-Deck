<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ms. Shouq 51talk | Operational Support Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0px); } }
        @keyframes pulseSoft { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.03); opacity: 0.9; } }
        .animate-slideup { animation: slideInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .illustration-pulse { animation: pulseSoft 4s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 backdrop-blur-md bg-white/90">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-black text-slate-900">Ms. Shouq | Teacher Readiness Deck</h1>
            <button onclick="location.reload()" class="px-4 py-2 bg-slate-900 text-white text-xs font-bold rounded-xl">Refresh Data</button>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-10">
        <section id="view-home" class="space-y-10">
            <div class="text-center space-y-4">
                <h2 class="text-3xl font-black text-slate-900">Select an Operational Pillar</h2>
            </div>
            <div id="pillars-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </section>

        <section id="view-scenarios" class="hidden space-y-8">
            <button onclick="location.reload()" class="text-xs font-bold text-slate-500 hover:text-slate-900"><i class="fa-solid fa-arrow-left"></i> Back to Pillars</button>
            <div class="grid grid-cols-12 gap-8">
                <div id="scenarios-list-container" class="lg:col-span-4 space-y-3"></div>
                <div id="solution-content-block" class="lg:col-span-8 bg-white p-8 rounded-3xl border border-slate-200">
                    Select a scenario to view protocol.
                </div>
            </div>
        </section>
    </main>

    <script>
        const database = {
            "pillar-1": {
                title: "Pillar 1: Technical Glitches",
                iconClass: "fa-solid fa-display",
                styleClasses: "bg-red-50 text-red-600 border-red-200",
                scenarios: [
                    { title: "App Crash / Screen Lag", problem: "You experience unexpected software crashes or classroom timer lag.", steps: ["Switch to your backup mobile hotspot.", "Force close and restart the AirClass software.", "Take a full-screen screenshot showing your desktop clock as evidence.", "Record the issue in your post-class memo."] },
                    { title: "Microphone Malfunction", problem: "The student cannot hear you or your audio level bar is flat.", steps: ["Re-select your headset in Audio/Video settings.", "Unplug and firmly re-seat your headset cable.", "Switch audio channels (Line A to Line B) in settings."] }
                ]
            },
            "pillar-2": {
                title: "Pillar 2: Attendance Traps",
                iconClass: "fa-solid fa-business-time",
                styleClasses: "bg-amber-50 text-amber-600 border-amber-200",
                scenarios: [
                    { title: "Time Zone Mismatch", problem: "Accidental late-entry penalties due to Egypt/Beijing time shifts.", steps: ["Cross-check the local AC calendar vs MyPage portal.", "Perform mental zone translations before the slot start time.", "Avoid arriving within the 4-minute late window."] }
                ]
            },
            "pillar-3": {
                title: "Pillar 3: Communication Rules",
                iconClass: "fa-solid fa-file-signature",
                styleClasses: "bg-blue-50 text-blue-600 border-blue-200",
                scenarios: [
                    { title: "Memo Compliance", problem: "Low ratings due to generic feedback.", steps: ["Use the two-sentence audit format.", "Sentence 1: State the mastered target skill.", "Sentence 2: Insert specific, measurable evidence from the lesson."] }
                ]
            },
            "pillar-4": {
                title: "Pillar 4: Teacher Rapport",
                iconClass: "fa-solid fa-face-smile-beam",
                styleClasses: "bg-purple-50 text-purple-600 border-purple-200",
                scenarios: [
                    { title: "Advanced Learner Gaps", problem: "Lesson finished in 15 mins instead of 25.", steps: ["Utilize classroom dropdowns to switch course materials.", "Introduce phonetic sound pairings (e.g., bin/pin).", "Drill multisyllabic blending for articulation."] }
                ]
            }
        };

        function init() {
            const container = document.getElementById('pillars-container');
            Object.keys(database).forEach(key => {
                const p = database[key];
                container.innerHTML += `
                    <div onclick="selectPillar('${key}')" class="bg-white border border-slate-200 p-6 rounded-2xl cursor-pointer hover:shadow-md transition-all">
                        <div class="w-12 h-12 ${p.styleClasses} rounded-xl flex items-center justify-center mb-4"><i class="${p.iconClass}"></i></div>
                        <h3 class="font-black">${p.title}</h3>
                    </div>
                `;
            });
        }

        function selectPillar(key) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-scenarios').classList.remove('hidden');
            const list = document.getElementById('scenarios-list-container');
            list.innerHTML = '';
            database[key].scenarios.forEach((s, i) => {
                list.innerHTML += `<div onclick="showSolution('${key}', ${i})" class="p-4 bg-white border border-slate-200 rounded-xl cursor-pointer font-bold text-xs">${s.title}</div>`;
            });
        }

        function showSolution(pillarKey, index) {
            const s = database[pillarKey].scenarios[index];
            document.getElementById('solution-content-block').innerHTML = `
                <h3 class="text-xl font-black mb-2">${s.title}</h3>
                <p class="text-sm text-slate-500 mb-6">${s.problem}</p>
                <ul class="space-y-3">${s.steps.map(st => `<li class="flex gap-3 text-sm font-medium"><i class="fa-solid fa-check text-emerald-500"></i> ${st}</li>`).join('')}</ul>
            `;
        }

        init();
    </script>
</body>
</html>
