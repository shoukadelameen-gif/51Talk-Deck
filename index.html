<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>51talk | Teacher's First Aid Kit</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0px); } }
        @keyframes pulseSoft { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.03); opacity: 0.9; } }
        .animate-slideup { animation: slideInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .illustration-pulse { animation: pulseSoft 4s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col antialiased">

    <header class="bg-white border-b border-slate-200/80 sticky top-0 z-40 backdrop-blur-md bg-white/90">
        <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3.5">
                <div class="bg-[#FFCC00] text-slate-900 font-black text-lg px-3 py-1.5 rounded-xl shadow-md shadow-amber-400/20 tracking-tighter flex items-center justify-center gap-1 border border-amber-300">
                    <span class="text-xl">51</span><span class="text-sm bg-slate-900 text-[#FFCC00] px-1 rounded">Talk</span>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-slate-900">51talk | Teacher's First Aid Kit</h1>
                    <p class="text-xs text-slate-500 font-semibold tracking-wide">Live Synchronized Portal</p>
                </div>
            </div>
            <button onclick="showHome()" id="back-home-btn" class="hidden px-4 py-2 bg-slate-100 hover:bg-[#0066CC] hover:text-white text-slate-700 text-xs font-bold rounded-xl border border-slate-200/60 transition-all items-center gap-2 shadow-sm">
                <i class="fa-solid fa-house-chimney"></i> Back to Pillars
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-10 flex flex-col justify-center">
        <section id="view-home" class="space-y-10 animate-fade">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 max-w-5xl mx-auto pt-4" id="pillars-container"></div>
        </section>

        <section id="view-scenarios" class="hidden space-y-8 animate-slideup">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-200 pb-5">
                <div class="flex items-center gap-4">
                    <div id="category-icon-container" class="w-12 h-12 rounded-2xl flex items-center justify-center text-xl shadow-sm"></div>
                    <div>
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-400 block">Workspace</span>
                        <h2 id="category-title" class="text-2xl font-black text-slate-900 tracking-tight">Pillar Title</h2>
                    </div>
                </div>
                <button onclick="openFormModal(null)" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-xl shadow-md transition-all flex items-center gap-1.5 active:scale-95">
                    <i class="fa-solid fa-circle-plus"></i> Add New Scenario
                </button>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                <div class="space-y-4 lg:col-span-4" id="scenarios-list-container"></div>
                <div class="lg:col-span-8 bg-white border border-slate-200/80 rounded-3xl shadow-sm p-6 sm:p-8 min-h-[520px] flex flex-col justify-center bg-gradient-to-br from-white to-slate-50/50" id="solution-content-block"></div>
            </div>
        </section>
    </main>

    <div id="form-modal" class="hidden fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg p-6 space-y-5">
            <h3 id="modal-heading" class="text-sm font-black text-slate-900 uppercase tracking-wider">Configure Blueprint</h3>
            <form id="scenario-form" onsubmit="saveScenarioData(event)" class="space-y-4">
                <input type="hidden" id="form-edit-index">
                <input type="text" id="form-title" required class="w-full border p-3 rounded-xl text-xs" placeholder="Scenario Title">
                <textarea id="form-problem" required rows="3" class="w-full border p-3 rounded-xl text-xs" placeholder="Problem Description"></textarea>
                <div id="steps-inputs-container" class="space-y-2"></div>
                <button type="button" onclick="appendStepInputField('')" class="text-xs font-bold text-indigo-600">+ Add Step</button>
                <div class="flex justify-end gap-2 pt-4">
                    <button type="button" onclick="closeFormModal()" class="px-4 py-2 bg-slate-100 rounded-xl text-xs font-bold">Cancel</button>
                    <button type="submit" class="px-5 py-2 bg-slate-900 text-white rounded-xl text-xs font-bold">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. Initialize Firebase
        firebase.initializeApp({
            databaseURL: "https://operational-support-suite-default-rtdb.asia-southeast1.firebasedatabase.app"
        });
        const db = firebase.database();
        let database = {};
        let currentPillarKey = null;

        // 2. Real-time Listener (Syncs everyone automatically)
        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                database = data;
                renderPillars();
                if (currentPillarKey) renderScenariosSidebarList();
            }
        });

        // 3. UI Rendering
        function renderPillars() {
            const container = document.getElementById('pillars-container');
            container.innerHTML = Object.keys(database).map(key => `
                <div onclick="selectPillar('${key}')" class="bg-white border rounded-2xl p-6 cursor-pointer hover:shadow-md transition-all">
                    <h3 class="font-black">${database[key].title}</h3>
                    <div class="text-xs text-slate-400 mt-2">${database[key].scenarios.length} Scenarios</div>
                </div>
            `).join('');
        }

        function selectPillar(key) {
            currentPillarKey = key;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('back-home-btn').classList.replace('hidden', 'flex');
            document.getElementById('view-scenarios').classList.remove('hidden');
            renderScenariosSidebarList();
        }

        function renderScenariosSidebarList() {
            const listContainer = document.getElementById('scenarios-list-container');
            listContainer.innerHTML = database[currentPillarKey].scenarios.map((scen, idx) => `
                <div onclick="selectScenario(${idx})" class="p-4 rounded-xl border bg-white cursor-pointer hover:bg-indigo-50">
                    <div class="font-bold text-sm">${scen.title}</div>
                </div>
            `).join('');
        }

        function selectScenario(idx) {
            const scen = database[currentPillarKey].scenarios[idx];
            document.getElementById('solution-content-block').innerHTML = `
                <h3 class="text-xl font-black">${scen.title}</h3>
                <p class="text-sm text-slate-600">${scen.problem}</p>
                <ul class="list-disc pl-5 text-sm space-y-2">${scen.steps.map(s => `<li>${s}</li>`).join('')}</ul>
            `;
        }

        // 4. Save/Delete (Cloud Sync)
        function saveScenarioData(e) {
            e.preventDefault();
            const idx = document.getElementById('form-edit-index').value;
            const steps = Array.from(document.querySelectorAll('.step-text-payload')).map(i => i.value);
            const obj = { title: document.getElementById('form-title').value, problem: document.getElementById('form-problem').value, steps };

            if(idx === "") database[currentPillarKey].scenarios.push(obj);
            else database[currentPillarKey].scenarios[parseInt(idx)] = obj;

            db.ref('/').set(database); // Save to Cloud
            closeFormModal();
        }

        function deleteScenarioEntry(index) {
            if(confirm("Delete this case?")) {
                database[currentPillarKey].scenarios.splice(index, 1);
                db.ref('/').set(database); // Save to Cloud
            }
        }

        function appendStepInputField(val = '') {
            const div = document.createElement('div');
            div.innerHTML = `<input type="text" value="${val}" class="step-text-payload w-full border p-2 rounded-xl text-xs">`;
            document.getElementById('steps-inputs-container').appendChild(div);
        }
        
        function openFormModal(idx) { document.getElementById('form-modal').classList.replace('hidden', 'flex'); }
        function closeFormModal() { document.getElementById('form-modal').classList.replace('flex', 'hidden'); }
        function showHome() { location.reload(); }
    </script>
</body>
</html>
