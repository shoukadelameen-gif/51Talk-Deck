<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ms. Shouq 51talk | Operational Support Suite</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 p-6">
    <header class="max-w-4xl mx-auto mb-8 flex justify-between items-center">
        <h1 class="text-xl font-black">Ms. Shouq | Teacher Readiness</h1>
        <button onclick="showHome()" id="back-home-btn" class="hidden px-4 py-2 bg-slate-200 rounded-lg text-xs font-bold">Back to Pillars</button>
    </header>

    <main class="max-w-4xl mx-auto">
        <section id="view-home" class="grid grid-cols-2 gap-4">
            <div onclick="selectPillar('pillar-1')" class="bg-white p-6 border rounded-xl cursor-pointer hover:bg-indigo-50"><h3>Pillar 1</h3><div id="count-pillar-1">...</div></div>
            <div onclick="selectPillar('pillar-2')" class="bg-white p-6 border rounded-xl cursor-pointer hover:bg-indigo-50"><h3>Pillar 2</h3><div id="count-pillar-2">...</div></div>
            <div onclick="selectPillar('pillar-3')" class="bg-white p-6 border rounded-xl cursor-pointer hover:bg-indigo-50"><h3>Pillar 3</h3><div id="count-pillar-3">...</div></div>
            <div onclick="selectPillar('pillar-4')" class="bg-white p-6 border rounded-xl cursor-pointer hover:bg-indigo-50"><h3>Pillar 4</h3><div id="count-pillar-4">...</div></div>
        </section>

        <section id="view-scenarios" class="hidden">
            <button onclick="openFormModal(null)" class="mb-4 bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold">+ Add Scenario</button>
            <div class="grid grid-cols-3 gap-6">
                <div id="scenarios-list-container" class="col-span-1 space-y-2"></div>
                <div id="solution-content-block" class="col-span-2 bg-white p-6 border rounded-xl">Select a scenario to begin.</div>
            </div>
        </section>
    </main>

    <div id="form-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
        <div class="bg-white p-6 rounded-xl w-full max-w-lg">
            <form id="scenario-form" onsubmit="saveScenarioData(event)">
                <input type="hidden" id="form-edit-index">
                <input type="text" id="form-title" placeholder="Title" class="w-full border p-2 mb-2 rounded" required>
                <textarea id="form-problem" placeholder="Problem" class="w-full border p-2 mb-2 rounded" required></textarea>
                <div id="steps-inputs-container" class="mb-2"></div>
                <button type="button" onclick="appendStepInputField('')" class="text-xs text-indigo-600 font-bold">+ Add Step</button>
                <div class="mt-4 flex gap-2">
                    <button type="submit" class="bg-black text-white px-4 py-2 rounded">Save to Cloud</button>
                    <button type="button" onclick="closeFormModal()" class="bg-slate-200 px-4 py-2 rounded">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        firebase.initializeApp({ databaseURL: "https://operational-support-suite-default-rtdb.asia-southeast1.firebasedatabase.app" });
        const db = firebase.database();
        let database = {};
        let currentPillarKey = null;

        // Auto-sync from cloud
        db.ref('/').on('value', (snapshot) => {
            if (snapshot.val()) {
                database = snapshot.val();
                renderPillarCounts();
                if (currentPillarKey) renderScenariosSidebarList();
            }
        });

        function renderPillarCounts() {
            for(let i=1; i<=4; i++) {
                const el = document.getElementById(`count-pillar-${i}`);
                if(el && database[`pillar-${i}`]) el.innerText = database[`pillar-${i}`].scenarios.length + " Scenarios";
            }
        }

        function selectPillar(id) {
            currentPillarKey = id;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-scenarios').classList.remove('hidden');
            document.getElementById('back-home-btn').classList.remove('hidden');
            renderScenariosSidebarList();
        }

        function renderScenariosSidebarList() {
            const container = document.getElementById('scenarios-list-container');
            container.innerHTML = '';
            database[currentPillarKey].scenarios.forEach((s, idx) => {
                const div = document.createElement('div');
                div.className = "p-3 border rounded cursor-pointer hover:bg-slate-100";
                div.innerHTML = `<h4 class="font-bold text-sm">${s.title}</h4>`;
                div.onclick = () => renderScenario(idx);
                container.appendChild(div);
            });
        }

        function renderScenario(idx) {
            const s = database[currentPillarKey].scenarios[idx];
            document.getElementById('solution-content-block').innerHTML = `
                <h3 class="text-lg font-bold mb-2">${s.title}</h3>
                <p class="text-sm text-slate-600 mb-4">${s.problem}</p>
                <ul class="list-disc pl-5 mb-4 text-sm">${s.steps.map(step => `<li>${step}</li>`).join('')}</ul>
                <button onclick="openFormModal(${idx})" class="text-xs bg-slate-200 px-2 py-1 rounded">Edit</button>
            `;
        }

        function openFormModal(idx) {
            document.getElementById('form-edit-index').value = idx !== null ? idx : 'new';
            const container = document.getElementById('steps-inputs-container');
            container.innerHTML = '';
            if (idx !== null) {
                const s = database[currentPillarKey].scenarios[idx];
                document.getElementById('form-title').value = s.title;
                document.getElementById('form-problem').value = s.problem;
                s.steps.forEach(step => appendStepInputField(step));
            } else {
                document.getElementById('form-title').value = '';
                document.getElementById('form-problem').value = '';
                appendStepInputField('');
            }
            document.getElementById('form-modal').classList.remove('hidden');
        }

        function closeFormModal() { document.getElementById('form-modal').classList.add('hidden'); }

        function appendStepInputField(val) {
            const div = document.createElement('div');
            div.innerHTML = `<input type="text" value="${val}" class="step-input w-full border p-1 mb-1 rounded text-sm">`;
            document.getElementById('steps-inputs-container').appendChild(div);
        }

        function saveScenarioData(e) {
            e.preventDefault();
            const editIdx = document.getElementById('form-edit-index').value;
            const steps = Array.from(document.getElementsByClassName('step-input')).map(i => i.value);
            const newData = { title: document.getElementById('form-title').value, problem: document.getElementById('form-problem').value, steps: steps };
            
            if (editIdx === 'new') database[currentPillarKey].scenarios.push(newData);
            else database[currentPillarKey].scenarios[editIdx] = newData;
            
            db.ref('/').set(database); // Saves to Cloud
            closeFormModal();
        }

        function showHome() {
            document.getElementById('view-home').classList.remove('hidden');
            document.getElementById('view-scenarios').classList.add('hidden');
            document.getElementById('back-home-btn').classList.add('hidden');
        }
    </script>
</body>
</html>
