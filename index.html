<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-100 p-4">
    <div id="app" class="max-w-md mx-auto">
        <div id="view-home">
            <h1 class="text-2xl font-black text-slate-800 mb-6">Support Matrix</h1>
            <div id="pillars-container" class="grid grid-cols-1 gap-4">
                <button onclick="selectPillar('pillar-1')" class="p-4 bg-red-50 text-red-600 border border-red-200 rounded-2xl text-left">Pillar 1: Technical Glitches</button>
                <button onclick="selectPillar('pillar-2')" class="p-4 bg-amber-50 text-amber-600 border border-amber-200 rounded-2xl text-left">Pillar 2: Attendance Traps</button>
                <button onclick="selectPillar('pillar-3')" class="p-4 bg-blue-50 text-blue-600 border border-blue-200 rounded-2xl text-left">Pillar 3: Communication Rules</button>
                <button onclick="selectPillar('pillar-4')" class="p-4 bg-purple-50 text-purple-600 border border-purple-200 rounded-2xl text-left">Pillar 4: Teacher Rapport</button>
            </div>
        </div>

        <div id="view-scenarios" class="hidden">
            <button onclick="showHome()" id="back-home-btn" class="mb-4 text-xs font-bold text-slate-500">← Back</button>
            <div id="category-title" class="text-xl font-bold mb-4"></div>
            <div id="scenarios-list-container" class="space-y-3"></div>
            <div id="solution-content-block" class="mt-6"></div>
        </div>
    </div>

    <div id="form-modal" class="hidden fixed inset-0 bg-slate-900/50 p-4 flex items-center">
        <form onsubmit="saveScenarioData(event)" class="bg-white p-6 rounded-2xl w-full">
            <input type="hidden" id="form-edit-index">
            <input type="text" id="form-title" placeholder="Title" class="w-full mb-2 p-2 border rounded">
            <textarea id="form-problem" placeholder="Problem" class="w-full mb-2 p-2 border rounded"></textarea>
            <div id="steps-inputs-container" class="space-y-2 mb-4"></div>
            <button type="button" onclick="appendStepInputField()" class="text-xs text-indigo-600">+ Add Step</button>
            <div class="mt-4 flex gap-2">
                <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-xl">Save</button>
                <button type="button" onclick="closeFormModal()" class="px-4 py-2">Cancel</button>
            </div>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAmyhSSolQQi-JV7o7Y1cXuYDGrB3oJPLg",
            databaseURL: "https://operational-support-suite-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let database = {};
        let currentPillar = "";

        // SYNC: This automatically updates your 'database' variable when you change Firebase
        db.ref('/').on('value', (snapshot) => {
            database = snapshot.val() || {};
            if(currentPillar) {
                updateScenarioList();
                // If a solution is open, refresh it too
                if(document.getElementById('form-modal').classList.contains('hidden')) {
                     // Optionally re-render solution if needed
                }
            }
        });

        // YOUR ORIGINAL LOGIC (Unchanged)
        function selectPillar(id) {
            currentPillar = id;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-scenarios').classList.remove('hidden');
            document.getElementById('category-title').innerText = database[id].title;
            updateScenarioList();
        }

        function showHome() { document.getElementById('view-home').classList.remove('hidden'); document.getElementById('view-scenarios').classList.add('hidden'); }
        function closeFormModal() { document.getElementById('form-modal').classList.add('hidden'); }
        function appendStepInputField(val = "") { const div = document.createElement('div'); div.className = "flex gap-2"; div.innerHTML = `<input type="text" class="step-input w-full border p-2 rounded" value="${val}">`; document.getElementById('steps-inputs-container').appendChild(div); }

        function updateScenarioList() { 
            const container = document.getElementById('scenarios-list-container'); 
            container.innerHTML = ""; 
            database[currentPillar].scenarios.forEach((s, index) => { 
                const div = document.createElement('div'); 
                div.className = "p-4 bg-white border border-slate-200 rounded-2xl shadow-sm cursor-pointer"; 
                div.innerHTML = `<h4 class="font-bold text-sm">${s.title}</h4>`; 
                div.onclick = () => showSolution(index); 
                container.appendChild(div); 
            }); 
        }

        function showSolution(index) {
            const s = database[currentPillar].scenarios[index];
            document.getElementById('solution-content-block').innerHTML = `<div class="bg-white p-6 rounded-2xl"><h3 class="font-black text-lg">${s.title}</h3><p class="text-sm text-slate-500">${s.problem}</p><button onclick="openFormModal(${index})" class="mt-4 text-xs bg-indigo-50 p-2 rounded">Edit</button></div>`;
        }

        function openFormModal(index) {
            document.getElementById('form-modal').classList.remove('hidden');
            document.getElementById('form-edit-index').value = index;
            const s = database[currentPillar].scenarios[index];
            document.getElementById('form-title').value = s.title;
            document.getElementById('form-problem').value = s.problem;
            document.getElementById('steps-inputs-container').innerHTML = "";
            s.steps.forEach(step => appendStepInputField(step));
        }

        function saveScenarioData(e) {
            e.preventDefault();
            const index = document.getElementById('form-edit-index').value;
            const steps = Array.from(document.querySelectorAll('.step-input')).map(i => i.value);
            const newData = { title: document.getElementById('form-title').value, problem: document.getElementById('form-problem').value, steps };
            database[currentPillar].scenarios[index] = newData;
            db.ref('/').set(database); // SAVES TO CLOUD
            closeFormModal();
        }
    </script>
</body>
</html>
