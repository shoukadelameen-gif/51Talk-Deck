<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-100 p-4">
    <div id="app" class="max-w-md mx-auto">
        <div id="view-home">
            <h1 class="text-2xl font-black text-slate-800 mb-6">Operational Support Suite</h1>
            <div id="pillars-container" class="grid grid-cols-1 gap-4">
                <button onclick="selectPillar('pillar-1')" class="p-4 bg-red-50 border border-red-200 rounded-2xl text-left">Pillar 1: Technical Glitches</button>
                <button onclick="selectPillar('pillar-2')" class="p-4 bg-amber-50 border border-amber-200 rounded-2xl text-left">Pillar 2: Attendance Traps</button>
                <button onclick="selectPillar('pillar-3')" class="p-4 bg-blue-50 border border-blue-200 rounded-2xl text-left">Pillar 3: Communication Rules</button>
                <button onclick="selectPillar('pillar-4')" class="p-4 bg-purple-50 border border-purple-200 rounded-2xl text-left">Pillar 4: Teacher Rapport</button>
            </div>
        </div>

        <div id="view-scenarios" class="hidden">
            <button onclick="showHome()" class="mb-4 text-xs font-bold text-slate-500 underline">← Back to Dashboard</button>
            <div id="category-title" class="text-xl font-black mb-4"></div>
            <div id="scenarios-list-container" class="space-y-3"></div>
            <div id="solution-content-block" class="mt-6"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAmyhSSolQQi-JV7o7Y1cXuYDGrB3oJPLg",
            databaseURL: "https://operational-support-suite-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let database = {};
        let currentPillar = "";

        // Sync and render
        db.ref('/').on('value', (snapshot) => {
            database = snapshot.val() || {};
            if(currentPillar) updateScenarioList();
        });

        function selectPillar(id) {
            currentPillar = id;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-scenarios').classList.remove('hidden');
            document.getElementById('category-title').innerText = database[id].title;
            updateScenarioList();
        }

        function showHome() {
            document.getElementById('view-home').classList.remove('hidden');
            document.getElementById('view-scenarios').classList.add('hidden');
        }

        function updateScenarioList() {
            const container = document.getElementById('scenarios-list-container');
            container.innerHTML = "";
            database[currentPillar].scenarios.forEach((s, index) => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white border border-slate-200 rounded-2xl shadow-sm cursor-pointer";
                div.innerHTML = `<h4 class="font-bold text-sm">${s.title}</h4>`;
                div.onclick = () => alert(s.problem);
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
